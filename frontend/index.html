<!DOCTYPE html>
<html>
<head>
    <title>Pharma Stability Monitoring Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Pharma Stability Monitoring Platform</h1>

    <label>Batch ID</label><br>
    <input type="text" id="batch_id"><br><br>

    <label>Timepoint</label><br>
    <input type="text" id="timepoint"><br><br>

    <label>Condition</label><br>
    <input type="text" id="condition"><br><br>

    <label>Assay</label><br>
    <input type="number" id="assay"><br><br>

    <label>Zinc</label><br>

    <input type="radio" name="zinc" value="PASS"> PASS

    <input type="radio" name="zinc" value="FAIL"> FAIL

    <br><br>

    <label>pH</label><br>
    <input type="number" step="0.1" id="ph"><br><br>

    <button>Submit Result</button>

    <p id="result"></p>

    <script src="script.js"></script>

</body>

</html>
